# Build the Leptos CSR bundle into a Docker image, push it, and redeploy.

name: Build & deploy

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  workflow_dispatch:
  push:
    branches: ["**"]
    tags:
      - "v*"
  pull_request:
    branches:
      - "main"
      - "develop"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.docker_registry }}/candyland-roller
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/candyland-roller:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY }}/candyland-roller:buildcache,mode=max
      - name: Trigger Watchtower update
        # Notify Watchtower to pull the exact image:tag refs we just pushed and
        # redeploy any container running them. Passes every tag from the metadata
        # step as a comma-separated ?image= list so Watchtower scopes the update to
        # this image instead of scanning every container it watches.
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          WATCHTOWER_HTTP_API_TOKEN: ${{ secrets.WATCHTOWER_HTTP_API_TOKEN }}
        run: |
          images=$(printf '%s\n' "$IMAGE_TAGS" | grep -v '^[[:space:]]*$' | paste -sd, -)
          echo "Notifying Watchtower to update: $images"
          curl -fsS --retry 3 --retry-delay 5 --retry-connrefused -X POST \
            -H "Authorization: Bearer ${WATCHTOWER_HTTP_API_TOKEN}" \
            "https://watchtower.javapl.us/v1/update?image=${images}"
